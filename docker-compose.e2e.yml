name: lunchbench-e2e

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      - VOTE_PASSWORD=test-admin-token
      - CLOUDFLARE_ACCOUNT_ID=00000000000000000000000000000000
    ports:
      - "8787:8787"
    volumes:
      - wrangler-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/api/health"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    stdin_open: true
    tty: true
    environment:
      - VITE_API_TARGET=http://api:8787
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  playwright:
    image: mcr.microsoft.com/playwright:v1.61.0-noble
    working_dir: /app
    environment:
      - BASE_URL=http://frontend:5173
      - API_URL=http://api:8787
      - E2E_ADMIN_TOKEN=test-admin-token
      - CI=true
    volumes:
      - ./e2e:/app
      - playwright-results:/app/playwright-report
    depends_on:
      frontend:
        condition: service_healthy
    command: >
      sh -c "npm install --no-package-lock && npx playwright install chromium && npx playwright test"

volumes:
  wrangler-data:
  playwright-results:
